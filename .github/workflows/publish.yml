name: Publish to npm

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    permissions:
      contents: write  # Required for creating GitHub releases
      id-token: write  # Required for npm provenance

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '24'
        registry-url: 'https://registry.npmjs.org'
        # Cache disabled intentionally: ensure clean install before publishing.
        package-manager-cache: false

    - name: Print node/npm versions
      run: node --version && npm --version

    - name: Install dependencies
      run: npm ci

    - name: Run linter
      run: npm run lint

    - name: Run tests
      run: npm test

    - name: Build project
      run: npm run build

    - name: Verify package contents
      run: |
        echo "Package contents:"
        npm pack --dry-run
        echo ""
        echo "Package verification complete"

    - name: Publish to npm
      run: npm publish --provenance --access public

    - name: Create GitHub Release
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        gh release create ${{ github.ref_name }} \
          --title "Release ${{ github.ref_name }}" \
          --notes "New release of YouTrack MCP Server

        **Package**: \`@vitalyostanin/youtrack-mcp@${{ github.ref_name }}\`

        Install with:
        \`\`\`bash
        npm install @vitalyostanin/youtrack-mcp@${{ github.ref_name }}
        \`\`\`

        See [CHANGELOG](https://github.com/VitalyOstanin/youtrack-mcp/blob/${{ github.ref_name }}/CHANGELOG.md) for details."
